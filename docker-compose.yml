services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mundial_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - mundial_network
    depends_on:
      - mundial_db
      - mundial_cache

  nginx:
    image: nginx:1.27-alpine
    container_name: mundial_nginx
    restart: unless-stopped
    ports:
      - "8180:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - mundial_network
    depends_on:
      - app

  mundial_db:
    image: mysql:8.4
    container_name: mundial_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mundial_2026_db
      MYSQL_ROOT_PASSWORD: password_mundial
      MYSQL_USER: admin_mundial
      MYSQL_PASSWORD: password_mundial
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - mundial_network

  mundial_cache:
    image: redis:7.2-alpine
    container_name: mundial_cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mundial_network
    command: redis-server --appendonly yes

  mailer:
    image: 'axllent/mailpit:latest'
    container_name: mundial_mailer
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - mundial_network

networks:
  mundial_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
